# docker-compose.yml — Tilla Full-Stack (local development only)
# For production, use Railway/Render directly with env vars set in their dashboards.
# Run locally: docker-compose up --build
version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       tilla_db
      POSTGRES_USER:     tilla
      POSTGRES_PASSWORD: tilla_local_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tilla"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY:    dev-only-change-in-prod-never-deploy-this
      DEBUG:                "True"
      ALLOWED_HOSTS:        localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL:         postgres://tilla:tilla_local_pass@db:5432/tilla_db
    depends_on:
      db:
        condition: service_healthy
    # Override CMD for development: run migrations then start server
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - /app/staticfiles

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
